<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252a67"/>
      <stop offset="100%" stop-color="#0b0f33"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Rounded navy square -->
  <rect x="10" y="10" width="180" height="180" rx="38" fill="url(#bg)"/>
  <!-- Red ring -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="url(#ring)" stroke-width="14"/>
  <!-- White medical cross -->
  <line x1="100" y1="74" x2="100" y2="126" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="74"  y1="100" x2="126" y2="100" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Subtle highlight -->
  <circle cx="68" cy="68" r="14" fill="#ffffff" opacity="0.08"/>
</svg>
