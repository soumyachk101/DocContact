<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" width="1100" height="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fefce8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#252a67" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1100" height="540" fill="url(#bg)"/>

  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="800" fill="#0b0f33">Live Queue — State Machine</text>
  <text x="550" y="58" text-anchor="middle" font-size="11" fill="#6b7280">Per-booking state derived from (currentToken, yourToken) — UI swaps automatically</text>

  <!-- Awaiting node -->
  <g transform="translate(120,200)" filter="url(#shadow)">
    <rect width="220" height="140" rx="16" fill="#ffffff" stroke="#252a67" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="38" rx="16" fill="#252a67"/>
    <rect y="22" width="220" height="16" fill="#252a67"/>
    <text x="110" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">⏳ Awaiting</text>
    <text x="110" y="68"  text-anchor="middle" font-size="10" font-weight="700" fill="#252a67">currentToken &lt; yourToken</text>
    <text x="110" y="92"  text-anchor="middle" font-size="9" fill="#475569">"X patients ahead"</text>
    <rect x="40" y="106" width="140" height="22" rx="11" fill="#eef2ff"/>
    <text x="110" y="121" text-anchor="middle" font-size="9" font-weight="700" fill="#252a67">bg-[#252a67]/5 chip</text>
  </g>

  <!-- YourTurn node -->
  <g transform="translate(440,200)" filter="url(#shadow)">
    <rect width="220" height="140" rx="16" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="38" rx="16" fill="#10b981"/>
    <rect y="22" width="220" height="16" fill="#10b981"/>
    <text x="110" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">🎯 Your Turn</text>
    <text x="110" y="68"  text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">currentToken == yourToken</text>
    <text x="110" y="92"  text-anchor="middle" font-size="9" fill="#065f46">"IT'S YOUR TURN!"</text>
    <rect x="40" y="106" width="140" height="22" rx="11" fill="#10b981">
      <animate attributeName="opacity" values="1;0.55;1" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <text x="110" y="121" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">animate-pulse</text>
  </g>

  <!-- Missed node -->
  <g transform="translate(760,200)" filter="url(#shadow)">
    <rect width="220" height="140" rx="16" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="38" rx="16" fill="#6b7280"/>
    <rect y="22" width="220" height="16" fill="#6b7280"/>
    <text x="110" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">✓ Missed</text>
    <text x="110" y="68"  text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">currentToken &gt; yourToken</text>
    <text x="110" y="92"  text-anchor="middle" font-size="9" fill="#4b5563">"Passed / Missed"</text>
    <rect x="40" y="106" width="140" height="22" rx="11" fill="#e5e7eb"/>
    <text x="110" y="121" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">bg-gray-100 chip</text>
  </g>

  <!-- Transitions -->
  <line x1="340" y1="270" x2="440" y2="270" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="390" y="262" text-anchor="middle" font-size="9" font-weight="700" fill="#10b981">current catches up</text>

  <line x1="440" y1="280" x2="760" y2="280" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowGray)"/>
  <path d="M 660 280 Q 600 320 600 280" fill="none" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="600" y="334" text-anchor="middle" font-size="9" font-weight="700" fill="#6b7280">next tick</text>

  <line x1="440" y1="260" x2="340" y2="260" stroke="#252a67" stroke-width="2" marker-end="url(#arrowNavy)"/>
  <text x="390" y="248" text-anchor="middle" font-size="9" font-weight="700" fill="#252a67">queue reset</text>

  <!-- Bottom timeline -->
  <g transform="translate(120,420)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#0b0f33">Token progression example</text>
    <line x1="0" y1="20" x2="860" y2="20" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Tick marks -->
    <g font-size="9" fill="#475569">
      <line x1="0"   y1="14" x2="0"   y2="26" stroke="#cbd5e1"/>
      <text x="0"   y="42" text-anchor="middle">#5</text>
      <line x1="120" y1="14" x2="120" y2="26" stroke="#cbd5e1"/>
      <text x="120" y="42" text-anchor="middle">#6</text>
      <line x1="240" y1="14" x2="240" y2="26" stroke="#cbd5e1"/>
      <text x="240" y="42" text-anchor="middle">#7</text>
      <line x1="360" y1="14" x2="360" y2="26" stroke="#cbd5e1"/>
      <text x="360" y="42" text-anchor="middle">#8</text>
      <line x1="480" y1="14" x2="480" y2="26" stroke="#10b981" stroke-width="2"/>
      <text x="480" y="42" text-anchor="middle" font-weight="700" fill="#065f46">#9 (YOU)</text>
      <line x1="600" y1="14" x2="600" y2="26" stroke="#cbd5e1"/>
      <text x="600" y="42" text-anchor="middle">#10</text>
      <line x1="720" y1="14" x2="720" y2="26" stroke="#cbd5e1"/>
      <text x="720" y="42" text-anchor="middle">#11</text>
      <line x1="840" y1="14" x2="840" y2="26" stroke="#9ca3af" stroke-width="2"/>
      <text x="840" y="42" text-anchor="middle" fill="#6b7280">#12 (missed)</text>
    </g>

    <!-- State band -->
    <rect x="0"   y="60" width="480" height="20" rx="10" fill="#eef2ff"/>
    <text x="240" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#252a67">AWAITING — 4 patients ahead</text>

    <rect x="480" y="60" width="120" height="20" rx="10" fill="#10b981">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <text x="540" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">YOUR TURN</text>

    <rect x="600" y="60" width="240" height="20" rx="10" fill="#e5e7eb"/>
    <text x="720" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">MISSED</text>
  </g>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowNavy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#252a67"/>
    </marker>
  </defs>
</svg>
